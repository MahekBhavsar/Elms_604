<app-admin-sidebar>
  <div class="container-fluid py-4 bg-light min-vh-100">

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-sm border-0 mb-4 overflow-hidden rounded-4">
          <div class="card-body p-0">
            <div class="d-flex align-items-center text-white p-4"
              style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
              <div class="me-4 bg-white bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center"
                style="width: 65px; height: 65px;">
                <i class="bi bi-person-check-fill fs-2"></i>
              </div>
              <div>
                <h6 class="mb-0 text-white-50">{{ staffData().role }} Portal</h6>
                <h4 class="fw-bold mb-0 text-white">{{ staffData().name }}</h4>
                <small class="opacity-75">Available Balance: {{ remainingBalance() }} Days</small>
              </div>
              <div class="ms-auto text-end">
                <h1 class="display-4 fw-bold mb-0">{{ leaveForm.Total_Days() }}</h1>
                <small class="text-uppercase fw-bold">Days Selected</small>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 bg-white">
          <div class="d-flex align-items-center mb-4">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-3">
              <i class="bi bi-file-earmark-plus text-primary fs-3"></i>
            </div>
            <h3 class="text-dark fw-bold mb-0">New Leave Application</h3>
          </div>

          <form (ngSubmit)="onSubmit()">
            <div class="row g-4">
              
              <div class="col-md-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Sr. No.</label>
                <input type="text" class="form-control bg-light border-0 py-3 shadow-none" 
                       [(ngModel)]="leaveForm.sr_no" name="sr_no" placeholder="Enter Serial No." required>
              </div>

              <div class="col-md-8">
                <label class="form-label small fw-bold text-muted text-uppercase">Reason for Leave</label>
                <select class="form-select bg-light border-0 py-3 shadow-none" 
                        [(ngModel)]="leaveForm.Type_of_Leave" name="type" (change)="fetchBalance()">
                  <option value="" disabled>Select Leave Type</option>
                  @for (name of leaveTypes(); track name) {
                    <option [value]="name">{{ name }}</option>
                  }
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-muted text-uppercase">Start Date</label>
                <input type="date" class="form-control bg-light border-0 py-3 shadow-none" [(ngModel)]="leaveForm.From"
                  name="from" (change)="calculateDays()" required>
              </div>

              <div class="col-md-6">
                <label class="form-label small fw-bold text-muted text-uppercase">End Date</label>
                <input type="date" class="form-control bg-light border-0 py-3 shadow-none" [(ngModel)]="leaveForm.To"
                  name="to" (change)="calculateDays()" required>
              </div>

              <div class="col-md-12">
                <div class="p-3 border rounded-3" [ngClass]="{'bg-danger bg-opacity-10 border-danger': leaveForm.Type_of_Leave === 'SL' && leaveForm.Total_Days() > 3, 'bg-light': true}">
                  <label class="form-label small fw-bold text-muted text-uppercase d-flex justify-content-between">
                    <span>Upload Supporting Document</span>
                    @if (leaveForm.Type_of_Leave === 'SL') {
                      @if (leaveForm.Total_Days() > 3) {
                        <span class="badge bg-danger">Medical Proof Compulsory</span>
                      } @else {
                        <span class="badge bg-warning text-dark">Optional Proof</span>
                      }
                    }
                  </label>
                  <input type="file" class="form-control bg-white py-2" (change)="onFileSelected($event)" name="document">
                  <div class="mt-2 small text-muted">
                    <i class="bi bi-info-circle me-1"></i>
                    Allowed: PDF, JPG, PNG. Mandatory for SL > 3 days.
                  </div>
                </div>
              </div>

              <div class="col-12 mt-5">
                <button type="submit" class="btn text-white w-100 py-3 rounded-pill fw-bold shadow-lg submit-btn-hover"
                  style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); transition: transform 0.2s;">
                  <i class="bi bi-check2-circle me-2"></i> Confirm and Submit Request
                </button>
              </div>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</app-admin-sidebar>
