<style>
  .admin-dashboard-container {
    background-color: #f8f9fa;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
    box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
    z-index: 1000;
    overflow-y: auto;
  }

  .sidebar-link {
    color: rgba(255, 255, 255, 0.8);
    transition: all 0.3s;
    border-radius: 8px;
    margin-bottom: 5px;
  }

  .sidebar-link:hover {
    color: #fff;
    background-color: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
  }

  .sidebar-link.active {
    color: #fff;
    background-color: rgba(255, 255, 255, 0.2);
    font-weight: 600;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .main-content {
    margin-left: 280px;
    background-image: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=2073&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .main-content::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(248, 249, 250, 0.85);
    /* Light overlay for readability */
  }

  .content-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .logout-btn {
    transition: all 0.3s;
  }

  .logout-btn:hover {
    background-color: #dc3545 !important;
    border-color: #dc3545 !important;
    color: white !important;
    box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3);
  }
</style>

<div class="d-flex min-vh-100 admin-dashboard-container">
  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white" style="width: 280px; min-height: 100vh;">
    <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none px-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
        class="bi bi-mortarboard-fill me-3" viewBox="0 0 16 16">
        <path
          d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.5 3.5a.5.5 0 0 0 .025.917l7.5 3a.5.5 0 0 0 .372 0L14 7.14V13a1 1 0 0 0-1 1v2h3v-2a1 1 0 0 0-1-1V6.739l.686-.275a.5.5 0 0 0 .025-.917l-7.5-3.5Z" />

    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">

          </svg>
          Dashboard Home

      </li>
      <li>

            <path
              d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7Zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm-5.784 6A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216ZM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
          </svg>
          Manage Staff Members
        </a>
      </li>
      <li>

          Leave Applications

    <div class="mt-2">
      <button (click)="logout()"
        class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center fw-bold py-2 logout-btn rounded-pill border-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
          class="bi bi-box-arrow-right me-2" viewBox="0 0 16 16">

        Logout

    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 main-content w-100">
    <div class="position-relative z-1 p-4 p-md-5 d-flex flex-column min-vh-100">

      <!-- Top header / Breadcrumb area -->
      <div class="d-flex justify-content-between align-items-center mb-5">
        <h4 class="text-primary fw-bold mb-0">Overview</h4>
        <div class="d-flex align-items-center">
          <span class="badge bg-primary rounded-pill px-3 py-2 d-flex align-items-center shadow-sm fs-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
              class="bi bi-person-circle me-2" viewBox="0 0 16 16">
              <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
              <path fill-rule="evenodd"
                d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z" />
            </svg>
            Administrator
          </span>
        </div>
      </div>

      <!-- Welcome Card -->
      <div class="content-card p-4 p-xl-5 mb-4 border-0">
        <div class="row align-items-center">
          <div class="col-lg-8">
            <h1 class="display-5 fw-bold text-dark mb-3">Welcome, Admin</h1>
            <p class="lead text-secondary mb-0">
              Use the sidebar to manage staff records, process leave requests, and oversee operations in the Educational
              Management System.
            </p>
          </div>
          <div class="col-lg-4 text-center d-none d-lg-block">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" fill="#0d6efd"
              class="bi bi-building opacity-50" viewBox="0 0 16 16">
              <path
                d="M4 2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1Zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1Zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1ZM4 5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1ZM7.5 5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1Zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1ZM4.5 8a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1Zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1Zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1Z" />

        </div>
      </div>

    </div>
  </div>
</div>
