<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="content-card p-4 shadow-sm border-0">
        <div class="d-flex align-items-center mb-4">
          <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#0d6efd" class="bi bi-gear-wide-connected" viewBox="0 0 16 16">
              <path d="M7.068.727c.243-.97 1.62-.97 1.864 0l.071.286a.96.96 0 0 0 1.622.634l.244-.163c.845-.563 1.812.404 1.25 1.25l-.163.244a.96.96 0 0 0 .634 1.622l.286.071c.97.243.97 1.62 0 1.864l-.286.071a.96.96 0 0 0-.634 1.622l.163.244c.563.845-.404 1.812-1.25 1.25l-.244-.163a.96.96 0 0 0-1.622.634l-.071.286c-.243.97-1.62.97-1.864 0l-.071-.286a.96.96 0 0 0-1.622-.634l-.244.163c-.845.563-1.812-.404-1.25-1.25l.163-.244a.96.96 0 0 0-.634-1.622l-.286-.071c-.97-.243-.97-1.62 0-1.864l.286-.071a.96.96 0 0 0 .634-1.622l-.163-.244c-.563-.845.404-1.812 1.25-1.25l.244.163a.96.96 0 0 0 1.622-.634l.071-.286zM8 4.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/>
            </svg>
          </div>
          <div>
            <h3 class="fw-bold text-dark mb-0">Leave Quotas</h3>
            <small class="text-muted">Set yearly limits for staff</small>
          </div>
        </div>

        <form (submit)="saveYearlyLimit()" #quotaForm="ngForm">
          <div class="mb-3">
            <label for="leaveName" class="form-label fw-semibold text-secondary small text-uppercase">Leave Type</label>
            <input 
              id="leaveName" 
              [(ngModel)]="leaveLimit.leave_name" 
              name="leave_name" 
              class="form-control form-control-lg border-2 shadow-none"
              placeholder="e.g., CL, SL, SAT" 
              required
              type="text">
          </div>

          <div class="mb-4">
            <label for="leaveLimit" class="form-label fw-semibold text-secondary small text-uppercase">Total Yearly Days</label>
            <input 
              id="leaveLimit" 
              [(ngModel)]="leaveLimit.limit" 
              name="limit" 
              class="form-control form-control-lg border-2 shadow-none"
              placeholder="e.g., 12" 
              required
              type="number">
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm py-2">
              Set Yearly Limit
            </button>
            <button type="button" (click)="resetForm()" class="btn btn-link text-decoration-none text-secondary btn-sm">
              Clear Form
            </button>
          </div>
        </form>

        <div class="mt-4 p-3 bg-light rounded-3 border-start border-4 border-primary">
          <p class="mb-0 small text-muted">
            <strong>Note:</strong> These limits are used to calculate remaining balances for staff members upon final approval.
          </p>
        </div>
      </div>

    </div>
  </div>
</div>
