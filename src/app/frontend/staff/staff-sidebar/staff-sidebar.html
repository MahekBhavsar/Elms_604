<div class="d-flex flex-column min-vh-100 bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm px-3 px-md-4 py-2 sticky-top">
    <div class="container-fluid p-0">
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-primary btn-sm rounded-3" (click)="toggleSidebar()">
          <i class="bi bi-list fs-5"></i>
        </button>
        <span class="navbar-brand mb-0 fw-bold text-primary">ELMS <span class="text-dark">Portal</span></span>
      </div>

      <div class="dropdown">
        <button class="btn btn-light border d-flex align-items-center rounded-pill px-3 py-1 dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <span class="badge bg-primary rounded-circle me-2 p-2">{{ userName.charAt(0) | uppercase }}</span>
          <span class="fw-semibold text-dark d-none d-md-inline">{{ userName }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li>
            <button class="dropdown-item text-danger fw-semibold" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid flex-grow-1">
    <div class="row h-100">
      <aside class="bg-primary text-white p-0" [ngClass]="isCollapsed ? 'col-2 col-md-1 col-lg-1' : 'col-12 col-md-3 col-lg-2'">
        <div class="d-flex flex-column h-100 p-3">
          <ul class="list-unstyled mb-0 d-grid gap-2">
            <li class="nav-item">
              <a
                routerLink="/staff-dashboard"
                routerLinkActive="active bg-white bg-opacity-25 text-white fw-bold border border-white border-opacity-50"
                [routerLinkActiveOptions]="{ exact: true }"
                class="nav-link text-white d-flex align-items-center py-2 px-3 rounded-3"
              >
                <i class="bi bi-speedometer2"></i>
                <span class="ms-3" [class.d-none]="isCollapsed">Dashboard</span>
              </a>
            </li>

            <li class="nav-item">
              <a
                routerLink="/apply-leave"
                routerLinkActive="active bg-white bg-opacity-25 text-white fw-bold border border-white border-opacity-50"
                class="nav-link text-white d-flex align-items-center py-2 px-3 rounded-3"
              >
                <i class="bi bi-calendar2-plus"></i>
                <span class="ms-3" [class.d-none]="isCollapsed">Apply Leave</span>
              </a>
            </li>

            @if (isHOD()) {
            <li class="nav-item">
              <a
                routerLink="/hod-leave-approved"
                routerLinkActive="active bg-white bg-opacity-25 text-white fw-bold border border-white border-opacity-50"
                class="nav-link text-white d-flex align-items-center py-2 px-3 rounded-3"
              >
                <i class="bi bi-shield-check"></i>
                <span class="ms-3" [class.d-none]="isCollapsed">HOD Approvals</span>
              </a>
            </li>
            }

            <li class="nav-item">
              <a
                routerLink="/staff-view-status"
                routerLinkActive="active bg-white bg-opacity-25 text-white fw-bold border border-white border-opacity-50"
                class="nav-link text-white d-flex align-items-center py-2 px-3 rounded-3"
              >
                <i class="bi bi-clock-history"></i>
                <span class="ms-3" [class.d-none]="isCollapsed">My Status</span>
              </a>
            </li>
          </ul>

          <div class="mt-auto pt-3 border-top border-primary-subtle">
            <button (click)="logout()" class="btn btn-outline-light w-100 fw-semibold rounded-3">
              <i class="bi bi-box-arrow-right" [class.me-2]="!isCollapsed"></i>
              <span [class.d-none]="isCollapsed">Sign Out</span>
            </button>
          </div>
        </div>
      </aside>

      <main class="col bg-light px-0 overflow-auto">
        <ng-content></ng-content>
      </main>
    </div>
  </div>
</div>
