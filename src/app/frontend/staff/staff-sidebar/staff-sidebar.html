<div class="d-flex flex-column min-vh-100 bg-light">
  <nav class="navbar navbar-expand-lg navbar-light border-bottom px-4 px-md-5 py-3 sticky-top z-3 glass-header">
    <div class="container-fluid p-0">
      <div class="d-flex align-items-center mb-0">
        <button
          class="btn btn-primary bg-gradient border-0 me-3 rounded-circle shadow-sm text-white d-flex align-items-center justify-content-center toggle-btn-hover"
          style="width: 42px; height: 42px; transition: all 0.3s;" (click)="toggleSidebar()">
          <i class="bi" [ngClass]="isCollapsed ? 'bi-list fs-5' : 'bi-justify-left fs-5'"></i>
        </button>
        <span class="navbar-brand fw-bolder mb-0 d-flex align-items-center text-primary" style="letter-spacing: 0.5px;">
          <div class="bg-primary text-white rounded d-flex align-items-center justify-content-center me-2 shadow-sm"
            style="width: 36px; height: 36px;">
            <i class="bi bi-building fs-5"></i>
          </div>
          <span class="d-none d-sm-inline fs-4">ELMS <span class="text-dark fw-bold">Portal</span></span>
        </span>

        <!-- Connectivity & Sync Status Badge -->
        <div class="ms-auto d-flex align-items-center me-3">
          <div [class]="isOnline() ? 'bg-success' : 'bg-danger'" 
               class="rounded-circle me-2 shadow-sm" style="width: 10px; height: 10px;"
               [title]="isOnline() ? 'Connected to Cloud' : 'Offline Mode (Local)'">
          </div>
          <span class="badge rounded-pill fw-bold shadow-sm" 
                [ngClass]="isOnline() ? 'bg-success bg-opacity-10 text-success' : 'bg-danger bg-opacity-10 text-danger'"
                style="font-size: 0.75rem;">
            {{ isOnline() ? 'Online' : 'Offline' }}
          </span>

          @if (pendingCount() > 0) {
            <span class="badge bg-warning text-dark rounded-pill ms-2 shadow-sm animate-pulse cursor-pointer" 
                  style="font-size: 0.75rem;" (click)="viewOfflineQueue()" title="Click to MANAGE Offline Sync">
              <i class="bi bi-arrow-repeat me-1"></i> {{ pendingCount() }} Syncing...
            </span>
          }
        </div>
      </div>

      <div class="dropdown">
        <button
          class="btn btn-white border border-2 d-flex align-items-center rounded-pill px-3 py-1 shadow-sm dropdown-toggle profile-btn-hover"
          type="button" data-bs-toggle="dropdown" style="transition: all 0.3s;">
          <div class="text-white rounded-circle d-flex align-items-center justify-content-center me-2 fw-bold shadow-sm"
            style="width: 34px; height: 34px; font-size: 0.9rem; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
            {{ userName.charAt(0) | uppercase }}
          </div>
          <span class="fw-bold text-dark d-none d-md-inline small">{{ userName }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 py-2 rounded-3" style="min-width: 200px;">
          <li>
            <h6 class="dropdown-header text-uppercase small fw-bold text-primary" style="letter-spacing: 1px;">Staff
              Menu</h6>
          </li>
          <li>
            <hr class="dropdown-divider opacity-25">
          </li>
          <li>
            <button
              class="dropdown-item text-primary fw-semibold d-flex align-items-center py-2 px-3 dropdown-item-hover"
              routerLink="/profile-update">
              <div
                class="bg-primary bg-opacity-10 text-primary rounded p-2 me-3 d-flex align-items-center justify-content-center">
                <i class="bi bi-person-gear"></i>
              </div>
              Profile Update
            </button>
          </li>
          <li>
            <button
              class="dropdown-item text-danger fw-semibold d-flex align-items-center py-2 px-3 dropdown-item-hover"
              (click)="logout()">
              <div
                class="bg-danger bg-opacity-10 text-danger rounded p-2 me-3 d-flex align-items-center justify-content-center">
                <i class="bi bi-box-arrow-right"></i>
              </div>
              Sign Out
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="d-flex flex-grow-1 overflow-hidden">
    <!-- Sidebar -->
    <div class="text-white shadow-sm flex-shrink-0"
      style="background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);"
      [ngClass]="isCollapsed ? 'd-none d-md-block' : 'd-block'" [style.width]="isCollapsed ? '80px' : '260px'">

      <div class="d-flex flex-column h-100 p-3">
        <div class="d-flex align-items-center mb-3 mt-1" [class.justify-content-center]="isCollapsed">
          <div
            class="bg-white bg-opacity-10 rounded-3 p-2 border border-white border-opacity-25 d-flex align-items-center justify-content-center">
            <i class="bi bi-person-badge fs-5"></i>
          </div>
          <span class="fs-6 fw-bold ms-3 text-uppercase text-white" [class.d-none]="isCollapsed"
            style="letter-spacing: 1px;">Menu</span>
        </div>

        <hr class="text-white opacity-25 mb-3 mt-0">

        <ul class="nav nav-pills flex-column mb-auto d-grid gap-1">
          <li class="nav-item">
            <a routerLink="/staff-dashboard"
              routerLinkActive="bg-white bg-opacity-25 shadow-sm fw-bold border-start border-4 border-white opacity-100"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link text-white d-flex align-items-center py-3 rounded-end-3 border-0 opacity-75"
              [ngClass]="isCollapsed ? 'justify-content-center px-0' : 'px-3'">
              <i class="bi bi-speedometer2 fs-5"></i>
              <span class="ms-3" [class.d-none]="isCollapsed">Dashboard</span>
            </a>
          </li>

          <li class="nav-item">
            <a routerLink="/apply-leave"
              routerLinkActive="bg-white bg-opacity-25 shadow-sm fw-bold border-start border-4 border-white opacity-100"
              class="nav-link text-white d-flex align-items-center py-3 rounded-end-3 border-0 opacity-75"
              [ngClass]="isCollapsed ? 'justify-content-center px-0' : 'px-3'">
              <i class="bi bi-calendar2-plus fs-5"></i>
              <span class="ms-3" [class.d-none]="isCollapsed">Apply Leave</span>
            </a>
          </li>

          @if (isHOD()) {
          <li class="nav-item">
            <a routerLink="/hod-leave-approved"
              routerLinkActive="bg-white bg-opacity-25 shadow-sm fw-bold border-start border-4 border-white opacity-100"
              class="nav-link text-white d-flex align-items-center py-3 rounded-end-3 border-0 opacity-75"
              [ngClass]="isCollapsed ? 'justify-content-center px-0' : 'px-3'">
              <i class="bi bi-shield-check fs-5"></i>
              <span class="ms-3" [class.d-none]="isCollapsed">HOD Approvals</span>
            </a>
          </li>
          }

          <li class="nav-item">
            <a routerLink="/staff-view-status"
              routerLinkActive="bg-white bg-opacity-25 shadow-sm fw-bold border-start border-4 border-white opacity-100"
              class="nav-link text-white d-flex align-items-center py-3 rounded-end-3 border-0 opacity-75"
              [ngClass]="isCollapsed ? 'justify-content-center px-0' : 'px-3'">
              <i class="bi bi-clock-history fs-5"></i>
              <span class="ms-3" [class.d-none]="isCollapsed">My Status</span>
            </a>
          </li>
        </ul>

        <div class="mt-auto pt-3 border-top border-white border-opacity-25">
          <button (click)="logout()"
            class="btn btn-link text-white text-decoration-none w-100 d-flex align-items-center py-2 px-0 fw-semibold opacity-75 transition-all hover-opacity-100"
            [ngClass]="isCollapsed ? 'justify-content-center' : 'justify-content-start px-3'">
            <i class="bi bi-box-arrow-right fs-5" [class.me-3]="!isCollapsed"></i>
            <span [class.d-none]="isCollapsed">Sign Out</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-grow-1 overflow-auto bg-light w-100 p-0">
      <ng-content></ng-content>
    </div>
  </div>
</div>
