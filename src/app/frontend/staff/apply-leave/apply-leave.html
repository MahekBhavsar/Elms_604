<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="card shadow-sm border-0 mb-4 bg-primary text-white">
        <div class="card-body d-flex justify-content-between align-items-center p-4">
          <div>
            <h5 class="mb-0 opacity-75">Welcome, {{ staffData.name }}</h5>
            <h3 class="fw-bold mb-0">Total Remaining Balance</h3>
          </div>
          <div class="text-center">
            <h1 class="display-4 fw-bold mb-0">{{ remainingBalance }}</h1>
            <small>DAYS LEFT</small>
          </div>
        </div>
      </div>

      <div class="card shadow border-0 p-4">
        <h4 class="text-dark fw-bold mb-4">New Leave Application</h4>
        
        <form (submit)="onSubmit()">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Type of Leave</label>
              <select class="form-select" [(ngModel)]="leaveForm.Type_of_Leave" name="type">
                <option value="CL">Casual Leave (CL)</option>
                <option value="SL">Sick Leave (SL)</option>
                <option value="SAT">Saturday Leave (SAT)</option>
                <option value="VAL">Vacation Leave (VAL)</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">Total Days Requested</label>
              <input type="number" class="form-control bg-light" [(ngModel)]="leaveForm.Total_Days" name="days" readonly>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">From Date</label>
              <input type="date" class="form-control" [(ngModel)]="leaveForm.From" name="from" (change)="calculateDays()" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">To Date</label>
              <input type="date" class="form-control" [(ngModel)]="leaveForm.To" name="to" (change)="calculateDays()" required>
            </div>

            <div class="col-12 mt-4">
              <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                Submit Application
              </button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
